<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1e3a5f">
  <title>RxTask</title>

    :root {
      --primary: #1e3a5f;
      --primary-light: #2e5fa3;
      --accent: #00b4d8;
      --pa: #ef4444; --pb: #f97316; --pc: #94a3b8;
      --ok: #22c55e;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #1e293b;
      --sub: #64748b;
      --border: #e2e8f0;
      --nav: 65px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: var(--bg); color: var(--text);
      max-width: 430px; margin: 0 auto; min-height: 100vh;
    }

    /* ── STAFF SCREEN ── */
    #staffScreen {
      position: fixed; inset: 0; background: var(--primary);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 1000; padding: 40px 24px;
    }
    #staffScreen h1 { color: #fff; font-size: 30px; margin: 12px 0 6px; }
    #staffScreen p  { color: rgba(255,255,255,.65); font-size: 15px; margin-bottom: 36px; }
    .staff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 320px; }
    .staff-btn {
      background: rgba(255,255,255,.12); border: 1.5px solid rgba(255,255,255,.25);
      border-radius: 14px; padding: 18px 12px; color: #fff; cursor: pointer;
      text-align: center; transition: .15s;
    }
    .staff-btn:active { transform: scale(.96); background: rgba(255,255,255,.22); }
    .staff-btn .sname { font-size: 16px; font-weight: 700; }
    .staff-btn .srole { font-size: 11px; color: rgba(255,255,255,.55); margin-top: 4px; }

    /* ── HEADER ── */
    .header {
      background: var(--primary); color: #fff;
      padding: 14px 18px; padding-top: calc(14px + env(safe-area-inset-top));
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .staff-pill {
      background: rgba(255,255,255,.15); padding: 6px 14px;
      border-radius: 20px; font-size: 13px; cursor: pointer;
    }

    /* ── BOTTOM NAV ── */
    .bnav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px; background: #fff;
      border-top: 1px solid var(--border);
      display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100;
    }
    .nitem {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 9px 0; cursor: pointer; color: var(--sub); font-size: 10px;
      gap: 3px; transition: color .2s; user-select: none;
    }
    .nitem.on { color: var(--primary); }
    .nicon { font-size: 22px; line-height: 1; }

    /* ── MAIN ── */
    .main { padding: 16px; padding-bottom: calc(var(--nav) + 20px); }
    .page { animation: fadeUp .2s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }

    /* ── CARDS ── */
    .card {
      background: var(--card); border-radius: 14px; padding: 16px;
      margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .section-title {
      font-size: 12px; font-weight: 700; color: var(--sub);
      text-transform: uppercase; letter-spacing: .5px; margin: 20px 0 10px;
    }

    /* ── STAT GRID ── */
    .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
    .stat-card { background: #fff; border-radius: 12px; padding: 14px; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
    .stat-num { font-size: 26px; font-weight: 800; }
    .stat-lbl { font-size: 11px; color: var(--sub); margin-top: 2px; }

    /* ── PROGRESS ── */
    .pbar { background: var(--border); border-radius: 10px; height: 8px; overflow: hidden; margin: 8px 0; }
    .pfill { height: 100%; background: linear-gradient(90deg,var(--primary-light),var(--accent)); border-radius: 10px; transition: width .5s; }

    /* ── TASK ITEM ── */
    .titem {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 13px 0; border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .titem:last-child { border-bottom: none; }
    .tcheck {
      width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 6px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px;
      transition: all .2s;
    }
    .titem.done .tcheck { background: var(--ok); border-color: var(--ok); }
    .titem.done .tcheck::after { content: '✓'; color: #fff; font-size: 13px; font-weight: 800; }
    .titem.done .ttitle { text-decoration: line-through; color: var(--sub); }
    .tcontent { flex: 1; min-width: 0; }
    .ttitle { font-size: 14px; line-height: 1.45; margin-bottom: 6px; }
    .tmeta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .badge {
      display: inline-flex; align-items: center; padding: 2px 9px;
      border-radius: 10px; font-size: 11px; font-weight: 700;
    }
    .ba { background: #fee2e2; color: var(--pa); }
    .bb { background: #ffedd5; color: var(--pb); }
    .bc { background: #f1f5f9; color: var(--sub); }
    .gtag {
      font-size: 11px; color: var(--sub);
      background: var(--bg); padding: 2px 8px; border-radius: 8px;
    }

    /* ── FILTER CHIPS ── */
    .fscroll {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
      margin-bottom: 14px; scrollbar-width: none;
    }
    .fscroll::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px;
      border: 1.5px solid var(--border); background: #fff; color: var(--sub);
      cursor: pointer; white-space: nowrap; transition: all .18s; user-select: none;
    }
    .chip.on { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* ── GENRE HEADER ── */
    .genre-hd {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 0 8px; font-weight: 700; font-size: 15px;
    }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 40px 20px; color: var(--sub); }
    .empty-ico { font-size: 40px; margin-bottom: 12px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: calc(var(--nav) + 20px); left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff; padding: 10px 22px; border-radius: 20px;
      font-size: 13px; z-index: 999; pointer-events: none; animation: fadeUp .2s ease;
    }

    /* ── PROGRESS PAGE BARS ── */
    .gbar-row { margin-bottom: 13px; }
    .gbar-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
    .gbar-sub { font-size: 12px; color: var(--sub); }
    .gbar-inner { height: 6px; border-radius: 10px; transition: width .5s; }
  </style>
</head>

// ═══════════════════════════════ STATE ═══════════════════════════════
let staff    = localStorage.getItem('rx_staff') || null;
let done     = JSON.parse(localStorage.getItem('rx_done') || '[]');
let curPage  = 'home';
let pFil     = 'all';
let gFil     = 'all';

// ═══════════════════════════════ STAFF ═══════════════════════════════
function initStaff() {
  document.getElementById('staffGrid').innerHTML =
    STAFF.map(s => `<div class="staff-btn" onclick="pickStaff('${s.id}','${s.name}')">
      <div class="sname">${s.name}</div><div class="srole">${s.role}</div>
    </div>`).join('');
}
function pickStaff(id, name) {
  staff = id;
  localStorage.setItem('rx_staff', id);
  document.getElementById('staffScreen').style.display = 'none';
  document.getElementById('hdr').style.display  = 'flex';
  document.getElementById('main').style.display = 'block';
  document.getElementById('bnav').style.display = 'flex';
  document.getElementById('spill').textContent  = name + ' さん';
  buildGenreFilter();
  render('home');
}
function changeStaff() { document.getElementById('staffScreen').style.display = 'flex'; }

// ═══════════════════════════════ NAV ═══════════════════════════════
function nav(page, el) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.nitem').forEach(n => n.classList.remove('on'));
  document.getElementById('page-' + page).style.display = 'block';
  el.classList.add('on');
  curPage = page;
  render(page);
}
function render(p) {
  if (p === 'home')     renderHome();
  if (p === 'tasks')    renderTasks();
  if (p === 'mine')     renderMine();
  if (p === 'progress') renderProgress();
}

// ═══════════════════════════════ HELPERS ═══════════════════════════════
const isDone  = id  => done.includes(id);
const getG    = id  => GENRES.find(g => g.id === id) || {label:id, color:'#888'};
const myTasks = ()  => T.filter(t => t.a.includes(staff) || t.a.includes('all'));

function toggle(id) {
  if (isDone(id)) done = done.filter(x => x !== id);
  else { done.push(id); toast('完了しました ✓'); }
  localStorage.setItem('rx_done', JSON.stringify(done));
  render(curPage);
}

function taskHTML(t) {
  const d = isDone(t.id);
  const g = getG(t.g);
  const bc = t.p === 'A' ? 'ba' : t.p === 'B' ? 'bb' : 'bc';
  return `<div class="titem ${d?'done':''}" onclick="toggle(${t.id})">
    <div class="tcheck"></div>
    <div class="tcontent">
      <div class="ttitle">${t.t}</div>
      <div class="tmeta">
        <span class="badge ${bc}">優先${t.p}</span>
        <span class="gtag">${g.label}</span>
        ${t.f ? `<span class="gtag">🕐 ${t.f}</span>` : ''}
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════ HOME ═══════════════════════════════
function renderHome() {
  const my    = myTasks();
  const aOpen = my.filter(t => t.p === 'A' && !isDone(t.id));
  const dCnt  = my.filter(t => isDone(t.id)).length;
  const pct   = my.length ? Math.round(dCnt / my.length * 100) : 0;
  const sname = STAFF.find(s => s.id === staff)?.name || '';

  document.getElementById('page-home').innerHTML = `
    <div class="card">
      <div style="font-size:13px;color:var(--sub);margin-bottom:4px">おはようございます</div>
      <div style="font-size:20px;font-weight:800;margin-bottom:16px">${sname} さん</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <span style="font-size:13px;color:var(--sub)">全体進捗</span>
        <span style="font-size:14px;font-weight:800;color:var(--primary)">${pct}%</span>
      </div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <div style="font-size:12px;color:var(--sub);margin-top:6px">${dCnt} / ${my.length} タスク完了</div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" style="color:var(--pa)">${my.filter(t=>t.p==='A').length}</div><div class="stat-lbl">優先A</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--pb)">${my.filter(t=>t.p==='B').length}</div><div class="stat-lbl">優先B</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--pc)">${my.filter(t=>t.p==='C').length}</div><div class="stat-lbl">優先C</div></div>
    </div>
    <div class="section-title">🔴 今すぐやること（優先A）</div>
    ${aOpen.length
      ? `<div class="card">${aOpen.map(taskHTML).join('')}</div>`
      : `<div class="empty"><div class="empty-ico">🎉</div><div>優先Aタスクはすべて完了です！</div></div>`}
  `;
}

// ═══════════════════════════════ TASKS ═══════════════════════════════
function buildGenreFilter() {
  document.getElementById('pf').innerHTML =
    ['all','A','B','C'].map((v,i) =>
      `<div class="chip ${v==='all'?'on':''}" onclick="setPF('${v}',this)">${
        v==='all'?'すべて': v==='A'?'🔴 優先A': v==='B'?'🟡 優先B':'⚪ 優先C'
      }</div>`).join('');
  document.getElementById('gf').innerHTML =
    `<div class="chip on" onclick="setGF('all',this)">すべて</div>` +
    GENRES.map(g => `<div class="chip" onclick="setGF('${g.id}',this)">${g.label}</div>`).join('');
}
function setPF(v, el) {
  pFil = v;
  document.querySelectorAll('#pf .chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on'); renderTasks();
}
function setGF(v, el) {
  gFil = v;
  document.querySelectorAll('#gf .chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on'); renderTasks();
}
function renderTasks() {
  let list = T;
  if (pFil !== 'all') list = list.filter(t => t.p === pFil);
  if (gFil !== 'all') list = list.filter(t => t.g === gFil);
  const byG = {};
  list.forEach(t => { if (!byG[t.g]) byG[t.g] = []; byG[t.g].push(t); });
  document.getElementById('tasksBody').innerHTML =
    Object.entries(byG).map(([gid, tasks]) =>
      `<div class="genre-hd">${getG(gid).label}</div>
       <div class="card">${tasks.map(taskHTML).join('')}</div>`
    ).join('') || `<div class="empty"><div class="empty-ico">🔍</div><div>該当するタスクがありません</div></div>`;
}

// ═══════════════════════════════ MINE ═══════════════════════════════
function renderMine() {
  const my = myTasks();
  const byP = {A:[], B:[], C:[]};
  my.forEach(t => byP[t.p]?.push(t));
  const lbl = {A:'🔴 優先A（今すぐ）', B:'🟡 優先B（今月〜来月）', C:'⚪ 優先C（中長期）'};
  document.getElementById('page-mine').innerHTML =
    ['A','B','C'].map(p => !byP[p].length ? '' :
      `<div class="section-title">${lbl[p]}</div>
       <div class="card">${byP[p].map(taskHTML).join('')}</div>`
    ).join('');
}

// ═══════════════════════════════ PROGRESS ═══════════════════════════════
function renderProgress() {
  const total = T.length;
  const dCnt  = done.length;
  const pct   = Math.round(dCnt / total * 100);
  const bars  = GENRES.map(g => {
    const gt = T.filter(t => t.g === g.id);
    const gd = gt.filter(t => isDone(t.id)).length;
    const gp = gt.length ? Math.round(gd / gt.length * 100) : 0;
    return {g, total:gt.length, done:gd, pct:gp};
  }).filter(x => x.total > 0);

  document.getElementById('page-progress').innerHTML = `
    <div class="card" style="text-align:center;padding:24px 16px">
      <div style="font-size:52px;font-weight:900;color:var(--primary)">${pct}%</div>
      <div style="color:var(--sub);margin-top:4px;font-size:14px">全体完了率</div>
      <div class="pbar" style="margin-top:16px"><div class="pfill" style="width:${pct}%"></div></div>
      <div style="font-size:13px;color:var(--sub);margin-top:8px">${dCnt} / ${total} タスク完了</div>
    </div>
    <div class="section-title">ジャンル別進捗</div>
    <div class="card">
      ${bars.map(x => `
        <div class="gbar-row">
          <div class="gbar-top">
            <span style="font-size:13px">${x.g.label}</span>
            <span class="gbar-sub">${x.done}/${x.total}</span>
          </div>
          <div class="pbar" style="height:6px">
            <div class="gbar-inner" style="width:${x.pct}%;background:${x.g.color}"></div>
          </div>
        </div>`).join('')}
    </div>
  `;
}

// ═══════════════════════════════ TOAST ═══════════════════════════════
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1800);
}

// ═══════════════════════════════ INIT ═══════════════════════════════
initStaff();
if (staff) {
  const s = STAFF.find(x => x.id === staff);
  if (s) pickStaff(s.id, s.name);
}
